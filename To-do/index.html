<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Simple Todo App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Todo List</h1>

    <div class="input-area">
      <input
        type="text"
        id="todoInput"
        placeholder="Write a todo and click +"
      />
      <button id="addButton">+</button>
    </div>

    <ul id="todoList">
      
    </ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
